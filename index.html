<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NavPoint Mobile</title>

  <style>
    :root{
      --c1:#80b9b9; /* 80b9b9ff */
      --c2:#9b9b9b; /* 9b9b9bff */
      --c3:#b3b3b3; /* b3b3b3ff */
      --c4:#d7d7d7; /* d7d7d7ff */
      --black:#000;
      --white:#fff;

      --ribbon-h:64px;
      --stripe-h:calc(var(--ribbon-h) / 8);
      --page-max:760px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--c4);
      color:#111;
      font-family: Roboto, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    .app{ min-height:100vh; display:flex; flex-direction:column; }

    /* Top ribbon */
    .topbar{
      height:var(--ribbon-h);
      background:var(--black);
      color:var(--white);
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 12px;
    }
    .title{
      margin:0;
      font-weight:800;
      font-size:18px;
      letter-spacing:.2px;
      line-height:1;
      flex:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:left;
    }
    .home-btn{
      appearance:none;
      border:2px solid var(--white);
      background:var(--c1);
      color:var(--white);
      font-weight:800;
      font-size:13px;
      padding:9px 12px;
      border-radius:10px;
      line-height:1;
      cursor:pointer;
      touch-action:manipulation;
      white-space:nowrap;
    }
    .home-btn:active{ transform:translateY(1px); }
    .home-btn:focus{ outline:none; box-shadow:0 0 0 3px rgba(128,185,185,.35); }

    .stripe{ height:var(--stripe-h); background:var(--c1); }

    main{
      flex:1;
      width:100%;
      max-width:var(--page-max);
      margin:0 auto;
      padding:8px;
    }

    /* Cards + headings */
    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.10);
      border-radius:14px;
      padding:8px;
    }
	section.card + section.card { margin-top: 10px; }

    h1,h2{ margin:0 0 10px 0; }
    h1{ font-size:18px; }
    h2{ font-size:16px; }
    p{ margin:0 0 12px 0; font-size:14px; color:#222; }

	.menu{
	  display:grid;
	  grid-template-columns:1fr 1fr;
	  gap:10px;
	  margin:12px 0 0 0;
	}

	.menu button {
	  width:100%;
	  padding:14px 12px;
	  border-radius:12px;
	  border:1px solid rgba(0,0,0,.14);
	  background:#fff;
	  font-weight:900;
	  font-size:14px;
	  color:#111;
	  cursor:pointer;
	  touch-action:manipulation;

	  /* ---- ICON LAYOUT MAGIC ---- */
	  display:grid;
	  grid-template-columns: 28px 1fr 28px; /* icon | text | empty spacer */
	  align-items:center;
	  text-align:center;
	}

	.menu button:active { transform:translateY(1px); }

	.menu button:focus {
	  outline:none;
	  box-shadow:0 0 0 3px rgba(128,185,185,.35);
	}
	.menu button a {
	color: inherit;        /* same color as the button text */
	text-decoration: none; /* remove underline */
	font-weight: inherit;  /* keep your button weight */
	}

<!-- 	.btn-icon {
	  width:20px;
	  height:20px;
	  justify-self:start; /* pins icon left */
	} -->

                                                                          /* Reusable table */
    .table-wrap{
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
      margin-top:10px;
    }
    table.np-table{
      width:100%;
      border-collapse:collapse;
      min-width:560px;
      font-size:14px;
    }
    .np-table thead th{
      position:sticky;
      top:0;
      background:var(--c3);
      text-align:left;
      padding:6px 4px;
      border-bottom:1px solid rgba(0,0,0,.18);
      font-weight:900;
    }
    .np-table tbody td{
      padding:6px 4px;
      border-bottom:1px solid rgba(0,0,0,.08);
      vertical-align:top;
      background:#fff;
    }
    .np-table tbody tr:nth-child(even) td{
      background:rgba(215,215,215,.28);
    }
    .np-table tbody tr:last-child td{ border-bottom:none; }

    /* Small screens */
    @media (max-width:420px){
      .menu{ grid-template-columns:1fr; }
    }
    @media (max-width:360px){
      :root{ --ribbon-h:58px; }
      .title{ font-size:16px; }
      .home-btn{ padding:8px 10px; font-size:12px; }
    }
    .np-table.compact{
      min-width: 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;              /* space between logo and title */
      min-width:0;           /* allows title ellipsis to work */
      flex:1;                /* pushes Home button to right */
    }

    .logo{
      width:20px;            
      height:20px;
      flex:0 0 auto;
    }

  </style>
</head>

				  <li>Annual inspection by designated person (written record NOT required)</li>
				  <li>Inaccessible locations shall have periodic inspections</li>
				</ol>
				<hr>
				<div style="padding:10px 10px; border-radius:12px; background:#fff3f3;
							border:1px solid rgba(122,0,0,.25); margin-bottom:10px;">
				  <strong>Rejection Criteria</strong> per ASME B30.26<br>
				  </a>
				</div>
				<ol style="padding-left:18px; margin:8px 0 0 0; font-size:14px; line-height:1.45;">
				  <li>Missing or illegible <strong>maker's mark</strong> and/or load ID</li>
				  <li><strong>Reduction of 10%</strong> from original dimension</li>
				  <li>Bent, twisted, stretched, or otherwise <strong>broken bearing components</strong></li>
				  <li>Excessive nicks, gouges, pitting, and/or corrosion</li>
				  <li>Indications of <strong>heat damage</strong>, arc strikes, or unauthorized welding</li>
				  <li>Loose or <strong>missing hardware</strong> <em>(nuts, bolts, pins, etc.)</em> or other retaining devices</li>
				  <li>Unauthorized replacement components</li>
				  <li>Throat opening <strong>distortion of 5%</strong> - not to exceed 1/4"</li>
				</ol>
		</section>
		<section class="card">
			<h1>Reference: Slings</h1>
				<div style="padding:10px 10px; border-radius:12px; background:#fff3f3;
							border:1px solid rgba(122,0,0,.25); margin-bottom:10px;">
				  <strong>Inspaction Frequency</strong> per ASME B30.9<br>
				  </a>
				</div>
				<ol style="padding-left:18px; margin:8px 0 0 0; font-size:14px; line-height:1.45;">
				  <li>Visual inspection <strong>each day or shift</strong> before use</li>
				  <li>Complete annual inspection by designated person</li>
				  <li><strong>Written record</strong> of most recent periodic inspection shall be maintained</li>
				</ol>
				<hr>
				<div style="padding:10px 10px; border-radius:12px; background:#fff3f3;
							border:1px solid rgba(122,0,0,.25); margin-bottom:10px;">
				  <strong>Rejection Criteria</strong> per ASME B30.9<br>
				  </a>
				</div>
				<h2>Wire Rope</h2>
				<ol style="padding-left:18px; margin:8px 0 0 0; font-size:14px; line-height:1.45;">
				  <li><strong>10</strong> broken wires in one lay or <strong>5</strong> broken wires in one strand</li>
				  <li>Severe localized abrasion, kinking, crushing, birdcaging</li>
				  <li><strong>Corrosion</strong> of rope or end attachments</li>
				</ol>
				<br>
				<h2>Chain Slings</h2>
				<ol style="padding-left:18px; margin:8px 0 0 0; font-size:14px; line-height:1.45;">
				  <li>Cracks or breaks</li>
				  <li>Excessive wear, nicks, or gouges</li>
				  <li><strong>Stretched links</strong> or components</li>
				  <li>Bent, twisted, or <strong>deformed links</strong> or components</li>
				  <li><strong>Excessive corrosion</strong> or pitting</li>
				  <li>Lack of ability to <strong>hinge freely</strong></li>
				  <li>Weld spatter</li>
				</ol>
				<br>
				<h2>Web Slings</h2>
				<ol style="padding-left:18px; margin:8px 0 0 0; font-size:14px; line-height:1.45;">

				  <li>Melting or charring of any part of sling</li>
				  <li>Holes, tears, cuts, or snags</li>
				  <li>Worn or broken stitching at load-bearing points</li>
				  <li>Excessive abrasive wear</li>
				  <li>Discoloration and brittle/stiff areas of any part of sling</li>
				</ol>
				<br>
				<h2>Round Slings</h2>
				<ol style="padding-left:18px; margin:8px 0 0 0; font-size:14px; line-height:1.45;">

				  <li>Holes, tears, cuts, or <strong>snags which expose core yarns</strong></li>
				  <li>Broken or <strong>damaged core yarns</strong></li>
				  <li>Weld spatter exposing core yarns</li>
				  <li>Discoloration and brittle/<strong>stiff areas of any part</strong> of sling</li>
				  <br>
				</ol>

    <template id="ref-deformation">
      <section class="card">
        <h1>Reference: Deformation Severity Classification</h1>
        <p>
          Categorized into six levels ranging from <strong>no apparent deformation</strong> (Level 0) to <strong>total structural failure</strong> (Level 5).
        </p>

        <div class="table-wrap" role="region" aria-label="Deformation severity table (scrollable)">
          <table class="np-table">
            <thead>
              <tr>
                <th style="width:5%;" align="center">LVL</th>
                <th style="width:20%;">Classification</th>
                <th>Description</th>
                <th style="width:30%;">Typical Indicators</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td align="center">0</td>
                <td>No Apparent Deformation</td>
                <td>No visible or measurable deviation within normal tolerances.</td>
                <td>Straight/aligned; no distress noted.</td>
              </tr>
              <tr>
                <td align="center">1</td>
                <td>Minor Deformation</td>
                <td>Small localized distortion; does not materially affect function or load path.</td>
                <td>Slight bowing/warping; small dents; local distortion without connection distress.</td>
              </tr>
              <tr>
                <td align="center">2</td>
                <td>Moderate Deformation</td>
                <td>Visible measurable distortion affecting geometry/alignment; capacity may be reduced.</td>
                <td>Noticeable bending; measurable misalignment; early signs of yielding.</td>
              </tr>
              <tr>
                <td align="center">3</td>
                <td>Severe Deformation</td>
                <td>Substantial distortion altering geometry and load paths; performance impaired.</td>
                <td>Major bend/twist; pronounced out-of-plumb; connection fit-up affected.</td>
              </tr>
              <tr>
                <td align="center">4</td>
                <td>Partial Structural Failure</td>
                <td>Loss of load-carrying capacity in one or more members/connections; localized instability.</td>
                <td>Local buckling, fracture/tearing; connection failure; localized collapse/instability.</td>
              </tr>
              <tr>
                <td align="center">5</td>
                <td>Total Structural Failure</td>
                <td>Widespread loss of integrity, collapse/near-collapse; unsafe and non-serviceable.</td>
                <td>Global collapse; uncontrolled displacement; major separation or rupture.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <h2 style="margin-top:14px;">Application Notes</h2>
        <ul style="margin:0; padding-left:18px; font-size:14px; color:#222;">
          <li>Support severity with measurements where practical and corroborate with photos.</li>
          <li>If multiple conditions exist, classify by the governing (highest) severity or document separately.</li>
          <li>Levels 4–5 indicate failure conditions requiring immediate engineering evaluation and controls.</li>
        </ul>
      </section>
    </template>

function init24hTools() {
    // Only run if this template is currently mounted
    const startEl = document.getElementById("tStart");
    const endEl   = document.getElementById("tEnd");
    if (!startEl || !endEl) return;

    const betweenOut = document.getElementById("betweenOut");
    const betweenErr = document.getElementById("betweenErr");
    const rolloverEl = document.getElementById("rollover");

    const t12El = document.getElementById("t12");
    const ampmEl = document.getElementById("ampm");

const AMPM_KEY = "np_ampm_last";

// Load saved AM/PM (fallback to PM)
try {
  const saved = localStorage.getItem(AMPM_KEY);
  ampmEl.value = (saved === "AM" || saved === "PM") ? saved : "PM";
} catch {
  ampmEl.value = "PM";
}

// Save whenever user changes it
ampmEl.addEventListener("change", () => {
  try { localStorage.setItem(AMPM_KEY, ampmEl.value); } catch {}
});

    const convertOut = document.getElementById("convertOut");
    const convertErr = document.getElementById("convertErr");

    const btnCalc = document.getElementById("btnCalc");
    const btnSwap = document.getElementById("btnSwap");
    const btnClear = document.getElementById("btnClear");

    const btnConvert = document.getElementById("btnConvert");
    const btnSendStart = document.getElementById("sendStart");
    const btnSendEnd = document.getElementById("sendEnd");

    const clamp2 = (n) => String(n).padStart(2, "0");

    function parse24(s) {
      // Accept "H:MM", "HH:MM", "HMM", "HHMM"
      const raw = (s || "").trim();
      if (!raw) return { ok:false, msg:"Enter a time." };

      let h, m;
      const colon = raw.includes(":");
      if (colon) {
        const parts = raw.split(":");
        if (parts.length !== 2) return { ok:false, msg:"Use HH:MM." };
        h = Number(parts[0]);
        m = Number(parts[1]);
      } else {
        const digits = raw.replace(/\D/g, "");
        if (digits.length === 3) { h = Number(digits.slice(0,1)); m = Number(digits.slice(1)); }
        else if (digits.length === 4) { h = Number(digits.slice(0,2)); m = Number(digits.slice(2)); }
        else return { ok:false, msg:"Use HH:MM (or HHMM)." };
      }

      if (!Number.isFinite(h) || !Number.isFinite(m)) return { ok:false, msg:"Invalid numbers." };
      if (h < 0 || h > 23) return { ok:false, msg:"Hours must be 0–23." };
      if (m < 0 || m > 59) return { ok:false, msg:"Minutes must be 0–59." };

      return { ok:true, minutes: h * 60 + m, norm: `${clamp2(h)}:${clamp2(m)}` };
    }

    function parse12(s, ampm) {
      // Accept: "H", "H:MM", "HH:MM", "HMM", "HHMM"
      const raw = (s || "").trim();
      if (!raw) return { ok:false, msg:"Enter a time." };

      let h, m = 0;

      if (raw.includes(":")) {
        const parts = raw.split(":");
        if (parts.length !== 2) return { ok:false, msg:"Use H:MM or HHMM." };
        h = Number(parts[0]);
        m = Number(parts[1]);
      } else {
        const digits = raw.replace(/\D/g, "");

        if (digits.length === 1 || digits.length === 2) {
          // "2" or "12"
          h = Number(digits);
          m = 0;
        } else if (digits.length === 3) {
          // "230" -> 2:30
          h = Number(digits.slice(0, 1));
          m = Number(digits.slice(1));
        } else if (digits.length === 4) {
          // "0230" or "1130"
          h = Number(digits.slice(0, 2));
          m = Number(digits.slice(2));
        } else {
          return { ok:false, msg:"Use H:MM (or HHMM)." };
        }
      }

  if (!Number.isFinite(h) || !Number.isFinite(m)) return { ok:false, msg:"Invalid numbers." };
  if (h < 1 || h > 12) return { ok:false, msg:"Hours must be 1–12." };
  if (m < 0 || m > 59) return { ok:false, msg:"Minutes must be 0–59." };

  let hh = h % 12; // 12 -> 0
  if (ampm === "PM") hh += 12;

  return { ok:true, norm24: `${clamp2(hh)}:${clamp2(m)}`, minutes: hh*60 + m };
}


    function formatDuration(mins) {
      const sign = mins < 0 ? "-" : "";
      const abs = Math.abs(mins);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      const dec = (abs / 60).toFixed(2);
      return `${sign}${h}h ${clamp2(m)}m  (${sign}${dec} h)`;
    }

    function calcBetween() {
      betweenErr.textContent = "";
      const a = parse24(startEl.value);
      const b = parse24(endEl.value);
      if (!a.ok) { betweenErr.textContent = `Start: ${a.msg}`; betweenOut.textContent = "Result: —"; return; }
      if (!b.ok) { betweenErr.textContent = `End: ${b.msg}`; betweenOut.textContent = "Result: —"; return; }

      // Normalize inputs (optional nice UX)
      startEl.value = a.norm;
      endEl.value = b.norm;

      let diff = b.minutes - a.minutes;
      if (rolloverEl.checked && diff < 0) diff += 24*60;

      betweenOut.textContent = `Result: ${formatDuration(diff)}`;
    }

    function doSwap() {
      const tmp = startEl.value;
      startEl.value = endEl.value;
      endEl.value = tmp;
      calcBetween();
    }

    function doClear() {
      startEl.value = "";
      endEl.value = "";
      betweenOut.textContent = "Result: —";
      betweenErr.textContent = "";
    }

    function doConvert() {
      convertErr.textContent = "";
      const r = parse12(t12El.value, ampmEl.value);
      if (!r.ok) { convertErr.textContent = r.msg; convertOut.textContent = "Converted: —"; return null; }
      convertOut.textContent = `Converted: ${r.norm24}`;
      return r.norm24;
    }

    function sendTo(which) {
      const t = doConvert();
      if (!t) return;
      if (which === "start") startEl.value = t;
      else endEl.value = t;
      calcBetween();
    }

    // Wire buttons
    btnCalc.onclick = calcBetween;
    btnSwap.onclick = doSwap;
    btnClear.onclick = doClear;

    btnConvert.onclick = doConvert;
    btnSendStart.onclick = () => sendTo("start");
    btnSendEnd.onclick = () => sendTo("end");

    // Convenience: press Enter to calculate / convert
    startEl.addEventListener("keydown", (e) => { if (e.key === "Enter") calcBetween(); });
    endEl.addEventListener("keydown", (e) => { if (e.key === "Enter") calcBetween(); });
    t12El.addEventListener("keydown", (e) => { if (e.key === "Enter") doConvert(); });
  }

    const DENS = {

    function sanitizeExpr(s) {
      // Allow digits, operators, parentheses, decimal, whitespace, and "/" for fractions.
      // Reject anything else.
      return (s || "").trim();
    }

    function safeEval(expr) {
      const s = sanitizeExpr(expr);
      if (!s) return { ok:false, msg:"Missing value." };

      // Only allow these characters
      if (!/^[0-9+\-*/().\s]+$/.test(s)) return { ok:false, msg:"Invalid characters." };

      // Evaluate in a very constrained way
      try {
        // eslint-disable-next-line no-new-func
        const val = Function(`"use strict"; return (${s});`)();
        if (!Number.isFinite(val)) return { ok:false, msg:"Not a finite number." };
        return { ok:true, val: Number(val) };
      } catch {
        return { ok:false, msg:"Bad arithmetic." };
      }
    }

    function clamp2(n) { return String(n).padStart(2, "0"); }

    function updatePctLabel() {

    // Conversion helpers
    // Imperial inputs: H,W inches; L feet.
    // Metric inputs: H,W mm; L meters.
    function volume_m3(H, W, L, isImperial) {
      if (isImperial) {
        // in → ft: divide by 12
        const H_ft = H / 12;
        const W_ft = W / 12;
        const L_ft = L / 12;
        // ft^3 → m^3
        const ft3 = H_ft * W_ft * L_ft;
        return ft3 * 0.028316846592;
      } else {
        // mm → m
        const H_m = H / 1000;
        const W_m = W / 1000;
        const L_m = L / 1000;
        return H_m * W_m * L_m;
      }
    }

    function calc() {
      errEl.textContent = "";
      noteEl.textContent = "";

      const isImp = impEl.checked && !metEl.checked ? true : impEl.checked; // default imperial
      const matKey = matEl.value;
      const rho = DENS[matKey];
      const pct = Number(pctEl.value) / 100;

      const h = safeEval(hEl.value);
      const w = safeEval(wEl.value);
      const l = safeEval(lEl.value);

      if (!h.ok) { errEl.textContent = `H: ${h.msg}`; outEl.textContent = "Result: —"; return; }
      if (!w.ok) { errEl.textContent = `W: ${w.msg}`; outEl.textContent = "Result: —"; return; }
      if (!l.ok) { errEl.textContent = `L: ${l.msg}`; outEl.textContent = "Result: —"; return; }

      if (h.val <= 0 || w.val <= 0 || l.val <= 0) {
        errEl.textContent = "H, W, and L must be > 0.";
        outEl.textContent = "Result: —";
        return;
      }

      const Vm3 = volume_m3(h.val, w.val, l.val, isImp) * pct;
      const kg = Vm3 * rho;
      const lb = kg * 2.20462262185;

      // Display in the unit system selected (but also show the other for convenience)
      if (isImp) {
        outEl.textContent = `Result: ${fmt(lb, 0)} lb  (${fmt(kg, 1)} kg)`;
        noteEl.textContent = `Using ${matEl.options[matEl.selectedIndex].text} density ≈ ${rho} kg/m³. Inputs: H,W in inches; L in feet; percent = ${pctEl.value}%.`;
      } else {
        outEl.textContent = `Result: ${fmt(kg, 1)} kg  (${fmt(lb, 0)} lb)`;
        noteEl.textContent = `Using ${matEl.options[matEl.selectedIndex].text} density ≈ ${rho} kg/m³. Inputs: H,W in mm; L in meters; percent = ${pctEl.value}%.`;
      }
    }

    function clearAll() {
      hEl.value = "";
      wEl.value = "";
      lEl.value = "";
      pctEl.value = "100";
      updatePctLabel();
      outEl.textContent = "Result: —";
      errEl.textContent = "";
      noteEl.textContent = "";
      matEl.value = "steel";
      impEl.checked = true;
    }

    // Wire UI
    pctEl.addEventListener("input", updatePctLabel);
    btnCalc.addEventListener("click", calc);
    btnClear.addEventListener("click", clearAll);

    // Enter to calculate
    [hEl, wEl, lEl].forEach(el => el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") calc();
    }));

    // Initial paint
    updatePctLabel();
  }

                                                      <!-- **CONCRETE WEIGHT FUNCTION** -->
function initConcreteTool() {
  const rowsEl = document.getElementById("concRows");
  if (!rowsEl) return; // not on this page

  const impEl = document.getElementById("concImp");
  const metEl = document.getElementById("concMet");
  const rectEl = document.getElementById("concRect");
  const cylEl  = document.getElementById("concCyl");
  const rectBox = document.getElementById("concRectBox");
  const cylBox  = document.getElementById("concCylBox");

  const mixEl = document.getElementById("concMix");
  const errEl = document.getElementById("concErr");

  const LEl = document.getElementById("concL");
  const WEl = document.getElementById("concW");
  const HEl = document.getElementById("concH");
  const DEl = document.getElementById("concD");
  const CHEl = document.getElementById("concCH");

  const btnCalc = document.getElementById("concCalc");
  const btnClear = document.getElementById("concClear");

  const MIX = {
    normal: { label: "Normal-weight", pcf: 145 },
    light:  { label: "Lightweight",  pcf: 110 },
    heavy:  { label: "Heavyweight",  pcf: 155 },
    grout:  { label: "Cement grout", pcf: 140 },
  };

  function showShape() {
    const isCyl = cylEl.checked;
    rectBox.style.display = isCyl ? "none" : "grid";
    cylBox.style.display  = isCyl ? "grid" : "none";
    errEl.textContent = "";
    rowsEl.innerHTML = `<tr><td colspan="3">—</td></tr>`;
  }

  function volume_m3_fromInputs(isMetric, isCyl) {
    // All inputs are inches (imperial) OR mm (metric)
    if (!isCyl) {
      const L = safeEval(LEl.value); if (!L.ok) return { ok:false, msg:`L: ${L.msg}` };
      const W = safeEval(WEl.value); if (!W.ok) return { ok:false, msg:`W: ${W.msg}` };
      const H = safeEval(HEl.value); if (!H.ok) return { ok:false, msg:`H: ${H.msg}` };
      if (L.val <= 0 || W.val <= 0 || H.val <= 0) return { ok:false, msg:"All dimensions must be > 0." };

      if (isMetric) {
        // mm^3 -> m^3
        return { ok:true, m3: (L.val * W.val * H.val) * 1e-9 };
      } else {
        // in^3 -> m^3
        const IN3_TO_M3 = 1.6387064e-5;
        return { ok:true, m3: (L.val * W.val * H.val) * IN3_TO_M3 };
      }
    } else {
      const D = safeEval(DEl.value);  if (!D.ok)  return { ok:false, msg:`D: ${D.msg}` };
      const H = safeEval(CHEl.value); if (!H.ok)  return { ok:false, msg:`H: ${H.msg}` };
      if (D.val <= 0 || H.val <= 0) return { ok:false, msg:"All dimensions must be > 0." };

      const r = D.val / 2;
      const pi = Math.PI;

      if (isMetric) {
        // mm^3 -> m^3 ; cylinder V = pi*r^2*h
        return { ok:true, m3: (pi * r * r * H.val) * 1e-9 };
      } else {
        const IN3_TO_M3 = 1.6387064e-5;
        return { ok:true, m3: (pi * r * r * H.val) * IN3_TO_M3 };
      }
    }
  }

  function calc() {
    errEl.textContent = "";

    const isMetric = metEl.checked;
    const isCyl = cylEl.checked;

    const v = volume_m3_fromInputs(isMetric, isCyl);
    if (!v.ok) { errEl.textContent = v.msg; rowsEl.innerHTML = `<tr><td colspan="3">—</td></tr>`; return; }

    const mix = MIX[mixEl.value] || MIX.normal;

    // Convert density: pcf -> kg/m^3
    // 1 lb/ft^3 = 16.01846337 kg/m^3
    const rho = mix.pcf * 16.01846337;

    const kg = v.m3 * rho;
    const lb = kg * 2.20462262185;

    // Also show volume in ft^3 and yd^3 (handy in the US)
    const FT3_PER_M3 = 35.314666721;
    const ft3 = v.m3 * FT3_PER_M3;
    const yd3 = ft3 / 27;

    const out = [
      ["Mix", mix.label, ""],
      ["Volume", ft3, "ft³"],
      ["Volume", yd3, "yd³"],
      ["Weight", lb, "lb"],
      ["Weight", kg, "kg"],
    ];

    rowsEl.innerHTML = out.map(([label, val, unit]) => `
      <tr>
        <td>${label}</td>
        <td>${(typeof val === "number") ? fmt(val, 1) : val}</td>
        <td>${unit}</td>
      </tr>
    `).join("");
  }

  function clearAll() {
    [LEl, WEl, HEl, DEl, CHEl].forEach(el => { if (el) el.value = ""; });
    impEl.checked = true;
    rectEl.checked = true;
    mixEl.value = "normal";
    errEl.textContent = "";
    showShape();
  }

  // Wire
  rectEl.addEventListener("change", showShape);
  cylEl.addEventListener("change", showShape);
  btnCalc.addEventListener("click", calc);
  btnClear.addEventListener("click", clearAll);

  // Enter to calculate
  [LEl, WEl, HEl, DEl, CHEl].forEach(el => el && el.addEventListener("keydown", (e) => {
    if (e.key === "Enter") calc();
  }));

  showShape();
}

// ===============================
// Dates ↔ Weeks (2 cards) — JS
// ===============================

function initDateWeeksTool() {
  // ---------- helpers ----------
  const DAY_MS = 24 * 60 * 60 * 1000;

  // Parse <input type="date"> value: "YYYY-MM-DD" -> UTC timestamp at midnight
  function parseDateToUtcMs(yyyyMmDd) {
    const s = (yyyyMmDd || "").trim();
    if (!s) return { ok: false, msg: "Enter a date." };

    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
    if (!m) return { ok: false, msg: "Invalid date format." };

    const y = Number(m[1]);
    const mo = Number(m[2]); // 1–12
    const d = Number(m[3]);  // 1–31

    // Basic range validation
    if (!Number.isFinite(y) || !Number.isFinite(mo) || !Number.isFinite(d)) {
      return { ok: false, msg: "Invalid date." };
    }

    // Build UTC midnight
    const utc = Date.UTC(y, mo - 1, d);

    // Validate that the constructed date matches (catches 2026-02-31, etc.)
    const dt = new Date(utc);
    if (
      dt.getUTCFullYear() !== y ||
      dt.getUTCMonth() !== (mo - 1) ||
      dt.getUTCDate() !== d
    ) {
      return { ok: false, msg: "Invalid calendar date." };
    }

    return { ok: true, utcMs: utc };
  }

  function fmtWeeks1(n) {
    // Always 1 decimal place
    return Number(n).toFixed(1);
  }

  function fmtInt(n) {
    return String(Math.trunc(n));
  }

  function fmtMMDDYYYYFromUtcMs(utcMs) {
    const dt = new Date(utcMs);
    const mm = String(dt.getUTCMonth() + 1).padStart(2, "0");
    const dd = String(dt.getUTCDate()).padStart(2, "0");
    const yyyy = dt.getUTCFullYear();
    return `${mm}/${dd}/${yyyy}`;
  }

  // ---------- Card 1 elements ----------
  const dwStart = document.getElementById("dwStart");
  const dwEnd   = document.getElementById("dwEnd");
  const dwCalc  = document.getElementById("dwCalc");
  const dwClear = document.getElementById("dwClear");
  const dwOut   = document.getElementById("dwOut");
  const dwErr   = document.getElementById("dwErr");

  // ---------- Card 2 elements ----------
  const awStart    = document.getElementById("awStart");
  const awWeeks    = document.getElementById("awWeeks");
  const awCalc     = document.getElementById("awCalc");
  const awClear    = document.getElementById("awClear");
  const awUseWeeks = document.getElementById("awUseWeeks");
  const awOut      = document.getElementById("awOut");
  const awErr      = document.getElementById("awErr");

  // If none of the required fields exist, bail (not on this page)
  if (!dwStart || !dwEnd || !dwOut) return;

  // Keep last computed weeks from Card 1 for "Use weeks from above"
  let lastWeeks = null; // string like "3.4"

  // ---------- Card 1 logic: two dates -> inclusive days & weeks ----------
  function calcDiff() {
    if (dwErr) dwErr.textContent = "";
    dwOut.textContent = "—";
    lastWeeks = null;

    const a = parseDateToUtcMs(dwStart.value);
    const b = parseDateToUtcMs(dwEnd.value);

    if (!a.ok) { if (dwErr) dwErr.textContent = `Start: ${a.msg}`; return; }
    if (!b.ok) { if (dwErr) dwErr.textContent = `End: ${b.msg}`; return; }

    // Order dates so "here to there" works even if user flips them
    const start = Math.min(a.utcMs, b.utcMs);
    const end   = Math.max(a.utcMs, b.utcMs);

    // Inclusive day count
    const daysInclusive = Math.round((end - start) / DAY_MS) + 1;

    const weeks = daysInclusive / 7;
    const weeksStr = fmtWeeks1(weeks);

    lastWeeks = weeksStr;

    // Output example: "Days: 15   Weeks: 2.1"
    dwOut.textContent = `Days: ${fmtInt(daysInclusive)}   Weeks: ${weeksStr}`;
  }

  function clearDiff() {
    dwStart.value = "";
    dwEnd.value = "";
    if (dwErr) dwErr.textContent = "";
    dwOut.textContent = "—";
    lastWeeks = null;
    dwStart.focus();
  }

  // ---------- Card 2 logic: start date + weeks -> date ----------
  function parseWeeksInput(s) {
    const raw = (s || "").trim();
    if (!raw) return { ok:false, msg:"Enter weeks." };
    // allow decimals
    const n = Number(raw);
    if (!Number.isFinite(n)) return { ok:false, msg:"Weeks must be a number." };
    return { ok:true, val:n };
  }

  function calcAddWeeks() {
    if (awErr) awErr.textContent = "";
    if (awOut) awOut.textContent = "—";

    if (!awStart || !awWeeks || !awOut) return; // card not present

    const d = parseDateToUtcMs(awStart.value);
    if (!d.ok) { if (awErr) awErr.textContent = `Date: ${d.msg}`; return; }

    const w = parseWeeksInput(awWeeks.value);
    if (!w.ok) { if (awErr) awErr.textContent = w.msg; return; }

    // Convert weeks -> days. Since output is a DATE (whole days),
    // we round to the nearest whole day.
    const daysToAdd = Math.round(w.val * 7);

    const newUtc = d.utcMs + daysToAdd * DAY_MS;

    // Output ONLY the date
    awOut.textContent = fmtMMDDYYYYFromUtcMs(newUtc);
  }

  function clearAddWeeks() {
    if (!awStart || !awWeeks || !awOut) return;
    awStart.value = "";
    awWeeks.value = "";
    if (awErr) awErr.textContent = "";
    awOut.textContent = "—";
    awStart.focus();
  }

  function useWeeksFromAbove() {
    if (!awWeeks) return;
    if (lastWeeks == null) {
      if (awErr) awErr.textContent = "Run the Days→Weeks calculator above first.";
      return;
    }
    awWeeks.value = lastWeeks; // already 1 decimal
    if (awErr) awErr.textContent = "";
    awWeeks.focus();
  }

  // ---------- wire up ----------
  if (dwCalc)  dwCalc.addEventListener("click", calcDiff);
  if (dwClear) dwClear.addEventListener("click", clearDiff);

  dwStart.addEventListener("keydown", (e) => { if (e.key === "Enter") calcDiff(); });
  dwEnd.addEventListener("keydown",   (e) => { if (e.key === "Enter") calcDiff(); });

  if (awCalc)     awCalc.addEventListener("click", calcAddWeeks);
  if (awClear)    awClear.addEventListener("click", clearAddWeeks);
  if (awUseWeeks) awUseWeeks.addEventListener("click", useWeeksFromAbove);

  if (awStart) awStart.addEventListener("keydown", (e) => { if (e.key === "Enter") calcAddWeeks(); });
  if (awWeeks) awWeeks.addEventListener("keydown", (e) => { if (e.key === "Enter") calcAddWeeks(); });

  // Default output
  dwOut.textContent = "—";
  if (awOut) awOut.textContent = "—";
}
